name: LifeCare+ CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/lifecare-ci
      NODE_ENV: test
      JWT_SECRET: ci-jwt-secret
      JWT_REFRESH_SECRET: ci-jwt-refresh-secret
      DISABLE_EMERGENCY_DEMO: 'true'
      GOOGLE_PLACES_API_KEY: ''
      GOOGLE_MAPS_API_KEY: ''
      DISABLE_OSM_HOSPITALS: 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build -w backend

      - name: Build frontend
        run: npm run build -w frontend

      - name: Backend tests
        run: npm test -w backend

      - name: Lint frontend
        run: npm run lint -w frontend
        continue-on-error: true

  smoke-scripts:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Validate smoke scripts exist
        run: test -x scripts/interview-smoke-test.sh && test -x scripts/test-video-mediscan.sh
