# LifeCare+ API — Railway service config
# In Railway: Service → Settings → Config file path → backend/railway.toml

[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build -w backend"
watchPatterns = ["backend/**", "package.json", "package-lock.json"]

[deploy]
startCommand = "npm start -w backend"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
