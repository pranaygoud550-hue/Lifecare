# LifeCare+ Web — Railway service config
# In Railway: Service → Settings → Config file path → frontend/railway.toml

[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build -w frontend"
watchPatterns = ["frontend/**", "package.json", "package-lock.json"]

[deploy]
startCommand = "npm start -w frontend"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
