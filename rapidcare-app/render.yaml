# RapidCare API — Render Blueprint
# Frontend: deploy frontend/ to Vercel (see frontend/vercel.json)

services:
  - type: web
    name: rapidcare-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build -w rapidcare-backend
    startCommand: npm start -w rapidcare-backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: LIFECARE_API_URL
        value: https://lifecare-l42k.onrender.com
      - key: LIFECARE_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
